<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Установщик файлов</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .installer-container {
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 400px;
            text-align: center;
        }
        .btn-install {
            background-color: #28a745;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }
        .btn-install:hover {
            background-color: #218838;
        }
        .progress-bar-container {
            width: 100%;
            background-color: #ddd;
            border-radius: 5px;
            margin-top: 20px;
            display: none; /* Скрыто до нажатия кнопки */
            overflow: hidden;
        }
        .progress-bar {
            width: 0%;
            height: 25px;
            background-color: #28a745;
            text-align: center;
            line-height: 25px;
            color: white;
            font-size: 14px;
            transition: width 0.5s linear;
        }
        .status-text {
            margin-top: 15px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="installer-container">
        <h2>Мастер установки</h2>
        <p class="status-text">Нажмите кнопку ниже, чтобы начать загрузку и подготовку файла.</p>
        
        <button class="btn-install" id="installBtn" onclick="startInstallation()">Установить (Скачать)</button>
        
        <div class="progress-bar-container" id="progressContainer">
            <div class="progress-bar" id="progressBar">0%</div>
        </div>
        <p class="status-text" id="statusText"></p>
    </div>

    <script>
        function startInstallation() {
            const btn = document.getElementById('installBtn');
            const progressContainer = document.getElementById('progressContainer');
            const progressBar = document.getElementById('progressBar');
            const statusText = document.getElementById('statusText');

            btn.style.display = 'none'; // Прячем кнопку
            progressContainer.style.display = 'block'; // Показываем прогресс-бар
            statusText.innerText = "Идет загрузка файлов...";

            let progress = 0;
            const interval = setInterval(function() {
                if (progress >= 100) {
                    clearInterval(interval);
                    statusText.innerText = "Установка завершена! Файл успешно загружен.";
                    
                    // Автоматическая ссылка на скачивание файла
                    const link = document.createElement('a');
                    link.href = 'helloOS_TWO.img'; // Укажите ссылку на ваш файл или архив
                    link.click();
                } else {
                    progress += 10;
                    progressBar.style.width = progress + '%';
                    progressBar.innerText = progress + '%';
                }
            }, 500); // Скорость заполнения прогресс-бара
        }
    </script>
</body>
</html>
